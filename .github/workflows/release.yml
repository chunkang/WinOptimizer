name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: |
          dotnet publish src/WinOptimizer/WinOptimizer.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true

      - name: Package
        run: |
          $publishDir = "src/WinOptimizer/bin/Release/net8.0-windows/win-x64/publish"
          Compress-Archive -Path "$publishDir/WinOptimizer.exe" -DestinationPath "WinOptimizer.zip"

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $exe = "src/WinOptimizer/bin/Release/net8.0-windows/win-x64/publish/WinOptimizer.exe"
          $tag = "${{ github.ref_name }}"
          gh release create $tag $exe WinOptimizer.zip --title "WinOptimizer $tag" --generate-notes
